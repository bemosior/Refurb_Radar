<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Refurb Radar — Find second-life tech near you</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Tailwind CSS (CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Cyberpunk fonts: Orbitron (display) + JetBrains Mono (terminal/data) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          void: {
            950: '#050507',
            900: '#0a0a0f',
            800: '#111118',
            700: '#181820',
            600: '#22222e',
          },
          cyan: { DEFAULT: '#00F0FF' },
          hotpink: { DEFAULT: '#FF003C' },
        },
        fontFamily: {
          display: ['Orbitron', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        }
      }
    }
  }
</script>

<style>
  html, body { height: 100%; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    background: #0a0a0f;
  }

  #map { height: 100%; width: 100%; background: #0a0a0f; }

  /* Subtle cyberpunk grid backdrop behind UI chrome */
  .grid-fade {
    background-image:
      linear-gradient(rgba(0,240,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.06) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  /* Scanline overlay for terminal feel */
  .scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1500;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,240,255,0.02) 0px,
      rgba(0,240,255,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
  }

  .neon-text-cyan { text-shadow: 0 0 6px rgba(0,240,255,0.85), 0 0 16px rgba(0,240,255,0.4); }
  .neon-text-pink { text-shadow: 0 0 6px rgba(255,0,60,0.85), 0 0 16px rgba(255,0,60,0.4); }

  .neon-border-cyan { box-shadow: 0 0 0 1px rgba(0,240,255,0.5), 0 0 12px rgba(0,240,255,0.35), 0 0 28px rgba(0,240,255,0.12); }
  .neon-border-pink { box-shadow: 0 0 0 1px rgba(255,0,60,0.55), 0 0 12px rgba(255,0,60,0.4), 0 0 28px rgba(255,0,60,0.15); }

  /* Leaflet popup overrides */
  .leaflet-popup-content-wrapper {
    background: #0d0d13;
    border-radius: 10px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(0,240,255,0.4), 0 0 24px rgba(0,240,255,0.25), 0 8px 24px rgba(0,0,0,0.6);
  }
  .leaflet-popup-content { margin: 0; width: 270px !important; }
  .leaflet-popup-tip { background: #0d0d13; box-shadow: 0 0 8px rgba(0,240,255,0.25); }
  .leaflet-popup-close-button {
    color: #00F0FF !important;
    z-index: 10;
    font-size: 20px !important;
    padding: 6px 8px 0 0 !important;
    text-shadow: 0 0 6px rgba(0,240,255,0.8);
  }
  .leaflet-popup-close-button:hover { color: #FF003C !important; }

  .leaflet-control-zoom a {
    background: #111118 !important;
    color: #00F0FF !important;
    border: 1px solid rgba(0,240,255,0.4) !important;
  }
  .leaflet-control-zoom a:hover { background: #181820 !important; color: #FF003C !important; }
  .leaflet-control-attribution {
    background: rgba(5,5,7,0.75) !important;
    color: #6b7280 !important;
  }
  .leaflet-control-attribution a { color: #00F0FF !important; }

  /* Map pins */
  .custom-pin {
    background: #0a0a0f;
    width: 34px;
    height: 34px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #00F0FF;
    box-shadow: 0 0 6px rgba(0,240,255,0.8), 0 0 18px rgba(0,240,255,0.45);
  }
  .custom-pin.closed {
    border-color: #FF003C;
    box-shadow: 0 0 6px rgba(255,0,60,0.7), 0 0 16px rgba(255,0,60,0.35);
    opacity: 0.85;
  }
  .custom-pin span { transform: rotate(45deg); font-size: 16px; }

  .user-dot {
    width: 16px;
    height: 16px;
    background: #FF003C;
    border: 2px solid #0a0a0f;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,0,60,0.9), 0 0 18px rgba(255,0,60,0.6), 0 0 0 4px rgba(255,0,60,0.18);
    animation: pulse-pink 2s infinite;
  }
  @keyframes pulse-pink {
    0%, 100% { box-shadow: 0 0 8px rgba(255,0,60,0.9), 0 0 18px rgba(255,0,60,0.6), 0 0 0 4px rgba(255,0,60,0.18); }
    50% { box-shadow: 0 0 10px rgba(255,0,60,1), 0 0 24px rgba(255,0,60,0.75), 0 0 0 7px rgba(255,0,60,0.1); }
  }

  /* Hide scrollbar but keep scroll for the bottom sheet list */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  ::selection { background: rgba(0,240,255,0.3); color: #fff; }
</style>
</head>

<body class="bg-void-900 text-gray-200">
<div class="scanlines"></div>

<div class="flex flex-col h-screen w-screen overflow-hidden">

  <!-- Header -->
  <header class="flex-none grid-fade bg-void-950/95 text-white px-4 py-3 border-b border-cyan/30 z-[1000] flex items-center justify-between">
    <div>
      <h1 class="font-display text-xl sm:text-2xl font-900 tracking-wide flex items-center gap-2 text-cyan neon-text-cyan">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-hotpink shadow-[0_0_8px_2px_rgba(255,0,60,0.8)] animate-pulse"></span>
        REFURB RADAR
      </h1>
      <p class="text-gray-400 text-xs sm:text-sm mt-0.5">&gt; Find second-life tech in your neighborhood_</p>
    </div>
    <button id="locateBtn" title="Find my location"
      class="flex-none bg-void-800 hover:bg-void-700 active:bg-void-600 border border-cyan/50 text-cyan transition rounded-full p-3 neon-border-cyan">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"></path>
      </svg>
    </button>
  </header>

  <!-- Search bar -->
  <div class="flex-none bg-void-950 px-4 py-2.5 border-b border-cyan/20 z-[999]">
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-1/2 -translate-y-1/2 text-cyan/70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input id="searchInput" type="text" placeholder="search_by_city_or_item('MacBook')..."
        class="w-full pl-9 pr-9 py-2.5 rounded-full bg-void-800 border border-cyan/25 text-sm font-mono text-cyan focus:outline-none focus:ring-2 focus:ring-cyan focus:border-cyan/60 placeholder-gray-500" />
      <button id="clearSearch" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-hotpink">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Map + bottom sheet -->
  <div class="relative flex-1 min-h-0">
    <div id="map"></div>

    <!-- Result count chip -->
    <div id="resultChip" class="absolute top-3 left-1/2 -translate-x-1/2 z-[998] bg-void-900/95 backdrop-blur border border-cyan/40 px-3 py-1 rounded-full text-xs font-mono font-medium text-cyan neon-border-cyan hidden">
      <span id="resultCount">0</span> centers found
    </div>

    <!-- Bottom sheet list (mobile-friendly) -->
    <div class="absolute bottom-0 left-0 right-0 z-[998] pointer-events-none">
      <div class="pointer-events-auto bg-void-950/97 backdrop-blur border-t border-cyan/30 rounded-t-2xl shadow-[0_-4px_24px_rgba(0,240,255,0.15)] max-h-[40vh] sm:max-h-[45vh] flex flex-col">
        <div class="flex-none flex justify-center py-2 cursor-pointer" id="sheetHandle">
          <div class="w-10 h-1.5 bg-cyan/40 rounded-full"></div>
        </div>
        <div id="centerList" class="overflow-y-auto no-scrollbar px-3 pb-3 space-y-2"></div>
      </div>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ---------------------------------------------------------------
  // Dummy data source — replace with a real API/database later.
  // ---------------------------------------------------------------
  const recyclingCenters = [
    {
      id: 1,
      name: "Bay Area E-Cycle",
      lat: 37.7749,
      lng: -122.4194,
      address: "120 Market St, San Francisco, CA",
      inventory: "3x MacBook Air, Bulk HDMI cables, 2x iPad (4th gen)",
      phone: "(415) 555-0142",
      website: "https://example.com/bay-area-ecycle",
      status: "Open"
    },
    {
      id: 2,
      name: "GreenByte Recyclers",
      lat: 37.8044,
      lng: -122.2712,
      address: "455 Telegraph Ave, Oakland, CA",
      inventory: "5x Dell Latitude laptops, Assorted chargers, 1x 27in monitor",
      phone: "(510) 555-0199",
      website: "https://example.com/greenbyte",
      status: "Open"
    },
    {
      id: 3,
      name: "SecondLife Computers",
      lat: 37.6879,
      lng: -122.4702,
      address: "88 El Camino Real, Daly City, CA",
      inventory: "2x MacBook Pro 13in, Refurbished routers, USB-C hubs",
      phone: "(650) 555-0117",
      website: "https://example.com/secondlife-computers",
      status: "Closed"
    },
    {
      id: 4,
      name: "Circuit Renewal Co.",
      lat: 37.5630,
      lng: -122.3255,
      address: "900 Industrial Way, San Mateo, CA",
      inventory: "Bulk RAM sticks, 4x ThinkPad T480, Power supplies",
      phone: "(650) 555-0188",
      website: "https://example.com/circuit-renewal",
      status: "Open"
    },
    {
      id: 5,
      name: "EcoTech Trade-In Hub",
      lat: 37.3382,
      lng: -121.8863,
      address: "300 First St, San Jose, CA",
      inventory: "6x Chromebooks, 1x iMac 21in, Bluetooth keyboards",
      phone: "(408) 555-0163",
      website: "https://example.com/ecotech-tradein",
      status: "Open"
    },
    {
      id: 6,
      name: "Refresh Electronics Depot",
      lat: 37.9101,
      lng: -122.0652,
      address: "77 Civic Dr, Walnut Creek, CA",
      inventory: "3x Surface laptops, Networking switches, Webcams",
      phone: "(925) 555-0124",
      website: "https://example.com/refresh-depot",
      status: "Closed"
    },
    {
      id: 7,
      name: "Renew Tech Exchange",
      lat: 37.4419,
      lng: -122.1430,
      address: "210 University Ave, Palo Alto, CA",
      inventory: "2x MacBook Air M1, Bulk HDMI/USB cables, Tablets",
      phone: "(650) 555-0155",
      website: "https://example.com/renew-tech",
      status: "Open"
    },
    {
      id: 8,
      name: "Computer Reach",
      lat: 40.449333,
      lng: -79.889100,
      address: "7800 Susquehanna St. Suite 106 Pittsburgh, PA 15208",
      inventory: "HP EliteBook 850 G6, Dell Latitude 7490, Dell Latitude 7400",
      phone: "(412) 444-8816",
      website: "https://www.computerreach.org/",
      status: "Open"
    }
  ];

  // ---------------------------------------------------------------
  // Map setup
  // ---------------------------------------------------------------
  const DEFAULT_CENTER = [37.7749, -122.4194]; // San Francisco fallback
  const map = L.map('map', { zoomControl: false }).setView(DEFAULT_CENTER, 10);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Dark "Cyber" basemap (CARTO Dark Matter — free, no API key)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    subdomains: 'abcd',
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  function pinIcon(status) {
    return L.divIcon({
      className: '',
      html: `<div class="custom-pin ${status === 'Closed' ? 'closed' : ''}"><span>♻️</span></div>`,
      iconSize: [34, 34],
      iconAnchor: [17, 30],
      popupAnchor: [0, -28]
    });
  }

  function popupHtml(center) {
    const statusBadge = center.status === 'Open'
      ? `<span class="inline-block bg-cyan/10 text-cyan border border-cyan/40 text-[10px] font-mono font-bold tracking-wider px-2 py-0.5 rounded-full">● OPEN</span>`
      : `<span class="inline-block bg-hotpink/10 text-hotpink border border-hotpink/40 text-[10px] font-mono font-bold tracking-wider px-2 py-0.5 rounded-full">● CLOSED</span>`;

    const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${center.lat},${center.lng}`;

    return `
      <div class="font-mono">
        <div class="bg-void-950 border-b border-cyan/30 px-4 py-3">
          <div class="flex items-center justify-between gap-2">
            <h3 class="font-display font-bold text-sm leading-tight pr-4 text-cyan neon-text-cyan">${center.name}</h3>
          </div>
          <div class="mt-1.5">${statusBadge}</div>
        </div>
        <div class="px-4 py-3 space-y-2.5 text-xs text-gray-300">
          <p class="flex gap-1.5 text-gray-400">
            <span class="text-cyan">&gt;</span><span>${center.address}</span>
          </p>
          <div>
            <p class="font-bold text-hotpink text-[10px] uppercase tracking-widest mb-0.5">// Current Inventory</p>
            <p class="text-gray-300 leading-relaxed">${center.inventory}</p>
          </div>
          <div class="flex flex-col gap-1 text-gray-400">
            <a href="tel:${center.phone.replace(/[^\d+]/g, '')}" class="hover:text-cyan transition">☎ ${center.phone}</a>
            <a href="${center.website}" target="_blank" rel="noopener" class="hover:text-cyan transition truncate">⚡ visit_site</a>
          </div>
          <a href="${directionsUrl}" target="_blank" rel="noopener"
            class="mt-2 block w-full text-center bg-hotpink hover:bg-hotpink/90 active:bg-hotpink text-white font-display font-bold py-2.5 rounded-full text-xs tracking-widest uppercase transition shadow-[0_0_10px_rgba(255,0,60,0.6)] hover:shadow-[0_0_18px_rgba(255,0,60,0.85)]">
            Get Directions
          </a>
        </div>
      </div>
    `;
  }

  const markers = {};
  recyclingCenters.forEach(center => {
    const marker = L.marker([center.lat, center.lng], { icon: pinIcon(center.status) })
      .addTo(map)
      .bindPopup(popupHtml(center));
    markers[center.id] = marker;
  });

  // ---------------------------------------------------------------
  // Geolocation
  // ---------------------------------------------------------------
  let userMarker = null;

  function locateUser(showAlertOnError) {
    if (!navigator.geolocation) {
      if (showAlertOnError) alert('Geolocation is not supported by your browser.');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        map.setView([latitude, longitude], 12);

        if (userMarker) {
          userMarker.setLatLng([latitude, longitude]);
        } else {
          userMarker = L.marker([latitude, longitude], {
            icon: L.divIcon({ className: '', html: '<div class="user-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
            zIndexOffset: 1000
          }).addTo(map).bindPopup('You are here');
        }
      },
      (err) => {
        if (showAlertOnError) alert('Could not get your location: ' + err.message);
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }

  // Auto-locate on load (silent if denied), manual retry via button
  locateUser(false);
  document.getElementById('locateBtn').addEventListener('click', () => locateUser(true));

  // ---------------------------------------------------------------
  // List + search/filter
  // ---------------------------------------------------------------
  const listEl = document.getElementById('centerList');
  const searchInput = document.getElementById('searchInput');
  const clearSearchBtn = document.getElementById('clearSearch');
  const resultChip = document.getElementById('resultChip');
  const resultCount = document.getElementById('resultCount');

  function renderList(items) {
    listEl.innerHTML = '';

    if (items.length === 0) {
      listEl.innerHTML = `<p class="text-center text-gray-500 text-sm font-mono py-6">// no centers match your search_</p>`;
      return;
    }

    items.forEach(center => {
      const card = document.createElement('button');
      card.className = 'w-full text-left bg-void-900 hover:bg-void-800 active:bg-void-700 rounded-xl px-3.5 py-3 flex items-center gap-3 transition border border-cyan/15 hover:border-cyan/50';
      card.innerHTML = `
        <div class="flex-none w-10 h-10 rounded-full bg-void-950 border border-cyan/40 text-cyan flex items-center justify-center text-lg shadow-[0_0_8px_rgba(0,240,255,0.35)]">♻️</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="font-display font-bold text-sm text-gray-100 truncate">${center.name}</p>
            ${center.status === 'Open'
              ? '<span class="flex-none text-[10px] font-mono font-bold text-cyan bg-cyan/10 border border-cyan/30 px-1.5 py-0.5 rounded-full">OPEN</span>'
              : '<span class="flex-none text-[10px] font-mono font-bold text-hotpink bg-hotpink/10 border border-hotpink/30 px-1.5 py-0.5 rounded-full">CLOSED</span>'}
          </div>
          <p class="text-xs text-gray-500 font-mono truncate">${center.address}</p>
          <p class="text-xs text-cyan/70 font-mono truncate mt-0.5">${center.inventory}</p>
        </div>
      `;
      card.addEventListener('click', () => {
        map.setView([center.lat, center.lng], 14, { animate: true });
        markers[center.id].openPopup();
      });
      listEl.appendChild(card);
    });
  }

  function applyFilter() {
    const q = searchInput.value.trim().toLowerCase();
    clearSearchBtn.classList.toggle('hidden', q.length === 0);

    const filtered = q.length === 0
      ? recyclingCenters
      : recyclingCenters.filter(c =>
          c.name.toLowerCase().includes(q) ||
          c.address.toLowerCase().includes(q) ||
          c.inventory.toLowerCase().includes(q)
        );

    renderList(filtered);

    // Toggle map markers to match filter
    recyclingCenters.forEach(c => {
      const onMap = filtered.includes(c);
      const marker = markers[c.id];
      if (onMap && !map.hasLayer(marker)) marker.addTo(map);
      if (!onMap && map.hasLayer(marker)) map.removeLayer(marker);
    });

    if (q.length > 0) {
      resultChip.classList.remove('hidden');
      resultCount.textContent = filtered.length;
    } else {
      resultChip.classList.add('hidden');
    }
  }

  searchInput.addEventListener('input', applyFilter);
  clearSearchBtn.addEventListener('click', () => {
    searchInput.value = '';
    applyFilter();
    searchInput.focus();
  });

  renderList(recyclingCenters);

  // ---------------------------------------------------------------
  // Bottom sheet drag-to-collapse (simple toggle on handle tap)
  // ---------------------------------------------------------------
  const sheetHandle = document.getElementById('sheetHandle');
  const sheet = sheetHandle.parentElement;
  let collapsed = false;
  sheetHandle.addEventListener('click', () => {
    collapsed = !collapsed;
    sheet.style.transform = collapsed ? 'translateY(calc(100% - 28px))' : 'translateY(0)';
    sheet.style.transition = 'transform 0.25s ease';
  });
</script>

</body>
</html>
